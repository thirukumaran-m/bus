<script>
      function toggleMenu() {
        let menu = document.querySelector(".nav-links");
        let logo = document.querySelector(".logo");

        if (menu.style.display === "flex") {
          menu.style.display = "none";
          logo.style.display = "block";
        } else {
          menu.style.display = "flex";
          logo.style.display = "none";
        }
      }
    </script>
