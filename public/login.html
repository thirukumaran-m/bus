<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="icon" href="WhatsApp Image 2026-03-14 at 10.12.47 PM.jpeg" />

    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-image: url("WhatsApp\ Image\ 2026-03-13\ at\ 5.59.21\ AM.jpeg");
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: 100% 100%;
      }

      .login-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        width: 300px;
      }

      h2 {
        text-align: center;
      }

      input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }
      /* ===============================
   TABLET (max-width: 992px)
================================*/
      @media (max-width: 992px) {
        .login-box {
          width: 260px;
          padding: 25px;
        }

        h2 {
          font-size: 22px;
        }

        input {
          padding: 9px;
        }

        button {
          padding: 9px;
        }
      }

      /* ===============================
   MOBILE (max-width:768px)
================================*/
      @media (max-width: 768px) {
        body {
          padding: 20px;
          background-size: cover;
          background-position: center;
        }

        .login-box {
          width: 90%;
          max-width: 300px;
          padding: 20px;
        }

        h2 {
          font-size: 20px;
        }

        input {
          padding: 8px;
          font-size: 14px;
        }

        button {
          padding: 10px;
          font-size: 14px;
        }
      }

      /* ===============================
   SMALL MOBILE (max-width:480px)
================================*/
      @media (max-width: 480px) {
        .login-box {
          width: 95%;
          padding: 18px;
        }

        h2 {
          font-size: 18px;
        }

        input {
          padding: 7px;
          font-size: 13px;
        }

        button {
          padding: 9px;
          font-size: 13px;
        }
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Admin Login</h2>

      <input type="text" id="username" placeholder="Username" />

      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Login</button>
    </div>

    <script>
      function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "admin" && pass === "1234") {
          window.location.href = "admin.html";
        } else {
          alert("Invalid login");
        }
      }
    </script>
  </body>
</html>
